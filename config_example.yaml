simulation:
  start_time: "2024-01-01 00:00:00"
  end_time: "2024-01-07 23:59:59"
  interval_seconds: 300
  description: "Telco Cloud 1-week simulation"
  random_seed: 42
  diurnal_pattern: true
  weekly_pattern: true
  noise_level: 0.05

  nodes:
    - type: "ceph_storage"
      count: 3
      base_load: 0.6
      anomaly_frequency: "low"
      total_memory_kb: 262144000
      cpu_count: 32
      disk_count: 24

    - type: "compute"
      count: 10
      base_load: 0.4
      anomaly_frequency: "medium"
      total_memory_kb: 131072000
      cpu_count: 64
      disk_count: 4

    - type: "control_plane"
      count: 3
      base_load: 0.3
      anomaly_frequency: "low"
      total_memory_kb: 65536000
      cpu_count: 16
      disk_count: 2

    - type: "network"
      count: 2
      base_load: 0.35
      anomaly_frequency: "low"
      total_memory_kb: 32768000
      cpu_count: 8
      disk_count: 2

  scenarios:
    - type: "storage_contention"
      start_time: "2024-01-03 14:00:00"
      duration_hours: 2
      severity: "high"
      target_node_types: ["ceph_storage", "compute"]

    - type: "memory_pressure"
      start_time: "2024-01-05 02:00:00"
      duration_hours: 3
      severity: "medium"
      target_node_types: ["compute"]

    - type: "backup_storm"
      start_time: "2024-01-06 01:00:00"
      duration_hours: 4
      severity: "medium"

  output:
    format: "both"
    output_dir: "./output"
    filename_prefix: "sar_synthetic"
    compress: false
    chunk_size: 100000
